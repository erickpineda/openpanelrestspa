<div class="modal fade show d-block" [class.show]="isVisible" tabindex="-1" *ngIf="isVisible">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">
          <i class="fas fa-exclamation-triangle me-2"></i>
          Trabajo Sin Guardar
        </h5>
      </div>
      <div class="modal-body">
        <div *ngIf="!saveInProgress && !saveCompleted">
          <p>{{ sessionData?.message }}</p>
          <p class="text-danger">
            <strong>Tiene trabajo sin guardar que se perderá si cierra la sesión.</strong>
          </p>
        </div>

        <div *ngIf="saveInProgress" class="text-center">
          <div class="spinner-border text-primary mb-3" role="status">
            <span class="visually-hidden">Guardando...</span>
          </div>
          <p>Guardando su trabajo... Por favor espere.</p>
        </div>

        <div *ngIf="saveCompleted" class="text-center text-success">
          <i class="fas fa-check-circle fa-2x mb-3"></i>
          <p>¡Trabajo guardado correctamente!</p>
        </div>
      </div>
      <div class="modal-footer" *ngIf="!saveInProgress && !saveCompleted">
        <button type="button" class="btn btn-success" (click)="saveAndContinue()">
          <i class="fas fa-save me-2"></i>
          Guardar y Cerrar Sesión
        </button>
        <button type="button" class="btn btn-danger" (click)="logoutWithoutSaving()">
          <i class="fas fa-times me-2"></i>
          Cerrar Sin Guardar
        </button>
      </div>
    </div>
  </div>
</div>
<div class="modal-backdrop fade show" *ngIf="isVisible"></div>
