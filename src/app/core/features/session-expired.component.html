<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-warning text-dark">
          <h4 class="mb-0">Sesión Finalizada</h4>
        </div>
        <div class="card-body">
          <div class="alert alert-info">
            <i class="fas fa-info-circle me-2"></i>
            {{ sessionData?.message || 'Su sesión ha finalizado' }}
          </div>
          
          <div class="mb-3" *ngIf="sessionData?.type === 'LOGOUT'">
            <p>La sesión se cerró desde otro dispositivo o pestaña.</p>
          </div>
          
          <div class="mb-3" *ngIf="sessionData?.type === 'SESSION_EXPIRED'">
            <p>Su sesión ha caducado por inactividad.</p>
          </div>

          <div class="d-grid gap-2">
            <button class="btn btn-primary" (click)="goToLogin()">
              <i class="fas fa-sign-in-alt me-2"></i>
              Iniciar Sesión Nuevamente
            </button>
            <button class="btn btn-secondary" (click)="goToHome()">
              <i class="fas fa-home me-2"></i>
              Volver al Inicio
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
