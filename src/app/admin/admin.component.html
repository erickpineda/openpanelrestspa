@if (ready && isAuthed) {
  <app-toasts-container></app-toasts-container>
  <c-sidebar
    #sidebar="cSidebar"
    class="d-print-none sidebar sidebar-fixed"
    id="sidebar"
    colorScheme="dark"
    visible
    [unfoldable]="sidebarNarrow"
  >
    <c-sidebar-header class="border-bottom">
      <c-sidebar-brand [routerLink]="[]">
        <img
          class="sidebar-brand-full"
          src="assets/img/brand/coreui-angular.svg"
          alt="CoreUI Logo"
          height="46"
        />
        <img
          class="sidebar-brand-narrow"
          src="assets/img/brand/coreui-signet-white.svg"
          alt="CoreUI Logo"
          height="46"
        />
      </c-sidebar-brand>
    </c-sidebar-header>

    <ng-scrollbar pointerEventsMethod="scrollbar" visibility="hover">
      <c-sidebar-nav [navItems]="navItems" [dropdownMode]="'none'"></c-sidebar-nav>
    </ng-scrollbar>
    <c-sidebar-footer
      class="border-top d-flex align-items-end justify-content-end"
      [attr.aria-label]="sidebarNarrow ? 'Expandir sidebar' : 'Compactar sidebar'"
    >
      <button
        type="button"
        class="sidebar-toggler"
        (click)="toggleSidebarNarrow()"
        aria-label="Toggle sidebar fold"
      ></button>
    </c-sidebar-footer>
  </c-sidebar>
  <div
    class="wrapper d-flex flex-column min-vh-100 bg-light dark:bg-transparent"
    data-testid="admin-root"
  >
    @if (showGlobalRecoveryNotification) {
      <div class="container mt-3">
        <app-data-recovery-notification
          title="📥 Entradas no guardadas"
          [message]="
            'Tienes ' + temporaryEntriesCount + ' entrada(s) no guardada(s) de sesiones anteriores'
          "
          recoverText="Ver entradas temporales"
          ignoreText="Más tarde"
          discardText="Descartar todas"
          (onRecover)="onGlobalRecover()"
          (onIgnore)="onGlobalIgnore()"
          (onDiscard)="onGlobalDiscard()"
        ></app-data-recovery-notification>
      </div>
    }
    <!-- Header -->
    <app-default-header
      class="mb-4 d-print-none header header-sticky"
      position="sticky"
      sidebarId="sidebar"
      [busy]="(loadingService.globalLoading$ | async) ?? false"
      [labelDashboard]="labelDashboard"
      [labelUsers]="labelUsers"
      [labelGoHome]="labelGoHome"
      [labelAccount]="labelAccount"
      [labelUpdates]="labelUpdates"
      [labelMessages]="labelMessages"
      [labelTasks]="labelTasks"
      [labelComments]="labelComments"
      [labelSettings]="labelSettings"
      [labelProfile]="labelProfile"
      [labelProjects]="labelProjects"
      [projectsCount]="projectsCount"
      [userCounts]="{
        notifications: notificationsCount,
        tasks: tasksCount,
        messages: messagesCount,
        comments: commentsCount,
      }"
      [labelLockAccount]="labelLockAccount"
    ></app-default-header>
    <!-- Body -->
    <div class="body flex-grow-1 px-3">
      <c-container breakpoint="lg" class="h-auto">
        <router-outlet></router-outlet>
      </c-container>
    </div>
    <!-- Footer -->
    <app-default-footer></app-default-footer>
  </div>
} @else {
  <div class="d-flex justify-content-center align-items-center min-vh-100">
    <app-op-loader></app-op-loader>
  </div>
}
