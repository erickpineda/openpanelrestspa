<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <span>Archivos</span>
  </div>
  <div class="card-body" [attr.aria-busy]="loading ? 'true' : null">
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
      <span>{{ error }}</span>
      <button class="btn btn-sm btn-danger" (click)="load()">Reintentar</button>
    </div>
    <div *ngIf="loading" class="py-3 text-center"><div class="spinner-border" role="status"><span class="visually-hidden">Cargando...</span></div></div>
    <div *ngIf="!loading">
      <table class="table table-hover" role="table">
        <thead><tr><th>Nombre</th><th>Tamaño</th><th>Fecha</th></tr></thead>
        <tbody>
          <tr *ngFor="let f of items">
            <td class="text-truncate">{{ f.nombre }}</td>
            <td>{{ f.tamano | number }}</td>
            <td>{{ f.fechaCreacion | date:'dd-MM-yyyy HH:mm' }}</td>
          </tr>
          <tr *ngIf="items.length === 0">
            <td colspan="3" class="text-muted text-center">Sin archivos</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
