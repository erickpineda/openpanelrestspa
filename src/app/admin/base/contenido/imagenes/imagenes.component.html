<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between">
    <span>Imágenes</span>
  </div>
  <div class="card-body" [attr.aria-busy]="loading ? 'true' : null">
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
      <span>{{ error }}</span>
      <button class="btn btn-sm btn-danger" (click)="load()">Reintentar</button>
    </div>
    <div *ngIf="loading" class="py-3 text-center"><div class="spinner-border" role="status"><span class="visually-hidden">Cargando...</span></div></div>
    <div *ngIf="!loading">
      <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-3" *ngFor="let m of items">
          <div class="card h-100">
            <img *ngIf="m.url" [src]="m.url" class="card-img-top" [alt]="m.nombre || 'Imagen'">
            <div class="card-body">
              <div class="fw-semibold text-truncate">{{ m.nombre }}</div>
              <div class="text-muted small">{{ m.fechaCreacion | date:'dd-MM-yyyy HH:mm' }}</div>
            </div>
          </div>
        </div>
      </div>
      <div *ngIf="items.length === 0" class="text-muted">Sin imágenes</div>
    </div>
  </div>
</div>
