<c-container class="container-fluid">
  <c-card aria-live="polite">
  <c-card-header class="d-flex align-items-center justify-content-between">
      <span>Imágenes</span>
      <div class="btn-toolbar gap-2">
        <div class="btn-group" role="group" aria-label="Subida de imágenes">
          <input type="file" accept="image/*" #imageInput (change)="onFileSelected($event)" [disabled]="uploading" hidden />
          <button cButton color="primary" size="sm" (click)="openUpload(imageInput)" [disabled]="uploading">
            <svg cIcon name="cilCloudUpload" class="me-2"></svg>
            {{ uploading ? 'Subiendo...' : 'Subir' }}
          </button>
        </div>
      </div>
    </c-card-header>
    <c-card-body [attr.aria-busy]="loading ? 'true' : null">
      <c-row class="align-items-center mb-3 g-2">
        <c-col xs="12" md="4">
          <div class="text-muted small">Total {{ items.length }}</div>
        </c-col>
        <c-col xs="12" md="4" class="d-flex justify-content-md-center gap-2">
          <input cFormControl type="text" [value]="basicSearchText" (input)="onBasicSearchTextChange($any($event.target).value)" placeholder="Buscar nombre..." style="max-width: 280px;" />
          <button cButton color="secondary" variant="ghost" size="sm" (click)="toggleAdvanced()">Avanzado</button>
        </c-col>
        <c-col xs="12" md="4" class="d-flex justify-content-md-end gap-2 align-items-center">
          <select cSelect [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)" name="pageSizeSelect" style="max-width: 100px;">
            <option [ngValue]="5">5</option>
            <option [ngValue]="10">10</option>
            <option [ngValue]="20">20</option>
          </select>
        </c-col>
      </c-row>

      <div *ngIf="showAdvanced" class="mb-3">
        <c-row class="g-3 align-items-end">
          <c-col xs="12" md="4">
            <label class="form-label mb-1">Tipo MIME</label>
            <select cSelect class="form-select-sm" [(ngModel)]="filtroMime">
              <option value="">Todos</option>
              <option value="image/jpeg">image/jpeg</option>
              <option value="image/png">image/png</option>
              <option value="image/gif">image/gif</option>
              <option value="image/webp">image/webp</option>
            </select>
          </c-col>
          <c-col xs="6" md="4">
            <label class="form-label mb-1">Desde</label>
            <input cFormControl class="form-control-sm" type="date" [(ngModel)]="fechaDesde" />
          </c-col>
          <c-col xs="6" md="4">
            <label class="form-label mb-1">Hasta</label>
            <input cFormControl class="form-control-sm" type="date" [(ngModel)]="fechaHasta" />
          </c-col>
          <c-col xs="12" md="12" class="d-flex justify-content-md-end gap-2">
            <button cButton size="sm" color="primary" variant="outline" (click)="search()">
              <svg cIcon name="cilSearch"></svg> Buscar
            </button>
            <button cButton size="sm" color="secondary" variant="outline" (click)="reset()">
              <svg cIcon name="cilReload"></svg> Limpiar
            </button>
          </c-col>
        </c-row>
      </div>
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
        <span>{{ error }}</span>
      <button cButton color="danger" size="sm" (click)="load()">Reintentar</button>
      </div>
    <div *ngIf="loading" class="py-3 text-center"><c-spinner></c-spinner></div>
    <div *ngIf="!loading">
      <div class="table-responsive">
        <table responsive hover cAlign="top" cTable class="table table-sm" role="table" aria-label="Tabla de imágenes">
          <thead cTableColor="dark">
            <tr><th>Vista</th><th>Nombre</th><th>Fecha</th><th>Acciones</th></tr>
          </thead>
          <tbody>
            <tr *ngFor="let m of items">
              <td>
                <img *ngIf="m.uuid && preview[m.uuid]"
                     [src]="preview[m.uuid]"
                     alt=""
                     style="height: 32px; width: 32px; object-fit: cover; cursor: pointer;"
                     (click)="openPreview(m)" />
              </td>
              <td class="text-truncate" style="max-width: 240px;" [title]="m.nombre">{{ m.nombre }}</td>
              <td>{{ m.fechaCreacion | date:'dd-MM-yyyy HH:mm' }}</td>
              <td>
                <div class="btn-group">
                  <button cButton color="secondary" size="sm" variant="outline" (click)="download(m)" [disabled]="!m.uuid && !m.url" [attr.aria-label]="'Descargar ' + (m.nombre || '')">
                    <svg cIcon name="cilCloudDownload"></svg>
                  </button>
                </div>
              </td>
            </tr>
            <tr *ngIf="items.length === 0">
              <td colspan="4" class="text-muted text-center">Sin imágenes</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="d-flex justify-content-end align-items-center gap-2 mt-2">
        <button cButton color="light" size="sm" (click)="prev" [disabled]="!canPrev">Anterior</button>
        <button cButton color="light" size="sm" (click)="next" [disabled]="!canNext">Siguiente</button>
        <div class="text-muted small ms-2">Página {{ pageNo + 1 }} | Tamaño {{ pageSize }}</div>
      </div>
    </div>
    </c-card-body>
  </c-card>
</c-container>

<c-modal [visible]="previewModalVisible" (visibleChange)="previewModalVisible = $event" [size]="'xl'">
  <c-modal-header>
    <h5 cModalTitle>{{ previewItem?.nombre || 'Vista previa' }}</h5>
    <div class="ms-auto btn-toolbar">
      <div class="btn-group" role="group" aria-label="Zoom">
        <button cButton color="secondary" size="sm" variant="outline" (click)="zoomOut()" [disabled]="!canZoomOut()"><svg cIcon name="cilMinus"></svg></button>
        <button cButton color="secondary" size="sm" variant="outline" (click)="zoomIn()" [disabled]="!canZoomIn()"><svg cIcon name="cilPlus"></svg></button>
        <c-badge color="secondary" class="ms-2">{{ zoomPercent() }}%</c-badge>
      </div>
    </div>
  </c-modal-header>
  <c-modal-body>
    <div #previewScroll class="text-center" [style.cursor]="getPreviewUrlForModal() ? (isDragging ? 'grabbing' : 'grab') : 'default'" [style.userSelect]="isDragging ? 'none' : null" [style.touchAction]="getPreviewUrlForModal() ? 'none' : 'auto'" style="max-height: 80vh; overflow: auto;" (wheel)="onPreviewWheel($event)" (dblclick)="toggleZoom()" (mousedown)="onPreviewMouseDown($event)" (mousemove)="onPreviewMouseMove($event)" (mouseup)="onPreviewMouseUp()" (mouseleave)="onPreviewMouseLeave()" (touchstart)="onPreviewTouchStart($event)" (touchmove)="onPreviewTouchMove($event)" (touchend)="onPreviewTouchEnd()">
      <ng-container *ngIf="getPreviewUrlForModal() as url">
        <div [style.width]="(previewZoom * 100) + '%'" style="display: inline-block;">
          <img [src]="url"
               alt=""
               style="max-width: 100%; height: auto; border-radius: 4px;" />
        </div>
      </ng-container>
    </div>
    </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="closePreview()">Cerrar</button>
    <button cButton color="secondary" variant="outline" (click)="resetZoom()" [disabled]="!getPreviewUrlForModal()">
      <svg cIcon name="cilReload" class="me-2"></svg> Reset
    </button>
    <button cButton color="primary" [disabled]="!previewItem" (click)="previewItem && download(previewItem)">
      <svg cIcon name="cilCloudDownload" class="me-2"></svg> Descargar
    </button>
  </c-modal-footer>
</c-modal>
