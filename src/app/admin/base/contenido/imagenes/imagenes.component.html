<c-container class="container-fluid">
  <c-card aria-live="polite">
    <c-card-header class="d-flex align-items-center justify-content-between">
      <span>Imágenes</span>
    </c-card-header>
    <c-card-body [attr.aria-busy]="loading ? 'true' : null">
      <c-row class="align-items-center mb-3 g-2">
        <c-col xs="12" md="4">
          <div class="text-muted small">Total {{ items.length }}</div>
        </c-col>
        <c-col xs="12" md="4" class="d-flex justify-content-md-center gap-2">
          <input cFormControl type="text" [value]="basicSearchText" (input)="onBasicSearchTextChange($any($event.target).value)" placeholder="Buscar nombre..." style="max-width: 280px;" />
          <button cButton color="secondary" variant="ghost" size="sm" (click)="toggleAdvanced()">Avanzado</button>
        </c-col>
        <c-col xs="12" md="4" class="d-flex justify-content-md-end gap-2 align-items-center">
          <select cSelect [ngModel]="pageSize" (ngModelChange)="onPageSizeChange($event)" name="pageSizeSelect" style="max-width: 100px;">
            <option [ngValue]="6">6</option>
            <option [ngValue]="12">12</option>
            <option [ngValue]="24">24</option>
          </select>
        </c-col>
      </c-row>

      <div *ngIf="showAdvanced" class="mb-3">
        <c-row class="g-3 align-items-end">
          <c-col xs="12" md="4">
            <label class="form-label mb-1">Tipo MIME</label>
            <select cSelect class="form-select-sm" [(ngModel)]="filtroMime">
              <option value="">Todos</option>
              <option value="image/jpeg">image/jpeg</option>
              <option value="image/png">image/png</option>
              <option value="image/gif">image/gif</option>
              <option value="image/webp">image/webp</option>
            </select>
          </c-col>
          <c-col xs="6" md="4">
            <label class="form-label mb-1">Desde</label>
            <input cFormControl class="form-control-sm" type="date" [(ngModel)]="fechaDesde" />
          </c-col>
          <c-col xs="6" md="4">
            <label class="form-label mb-1">Hasta</label>
            <input cFormControl class="form-control-sm" type="date" [(ngModel)]="fechaHasta" />
          </c-col>
          <c-col xs="12" md="12" class="d-flex justify-content-md-end gap-2">
            <button cButton size="sm" color="primary" variant="outline" (click)="search()">
              <svg cIcon name="cilSearch"></svg> Buscar
            </button>
            <button cButton size="sm" color="secondary" variant="outline" (click)="reset()">
              <svg cIcon name="cilReload"></svg> Limpiar
            </button>
          </c-col>
        </c-row>
      </div>
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
        <span>{{ error }}</span>
      <button cButton color="danger" size="sm" (click)="load()">Reintentar</button>
      </div>
    <div *ngIf="loading" class="py-3 text-center"><c-spinner></c-spinner></div>
    <div *ngIf="!loading">
      <c-row class="g-3">
        <c-col class="col-6 col-md-4 col-lg-3" *ngFor="let m of items">
          <c-card class="h-100">
            <img *ngIf="m.url" [src]="m.url" class="card-img-top img-fluid" [alt]="m.nombre || 'Imagen'">
            <c-card-body>
              <div class="fw-semibold text-truncate">{{ m.nombre }}</div>
              <div class="text-muted small">{{ m.fechaCreacion | date:'dd-MM-yyyy HH:mm' }}</div>
            </c-card-body>
          </c-card>
        </c-col>
      </c-row>
      <div *ngIf="items.length === 0" class="text-muted">Sin imágenes</div>
      <div class="d-flex justify-content-end align-items-center gap-2 mt-2">
        <button cButton color="light" size="sm" (click)="prev()" [disabled]="pageNo===0">Anterior</button>
        <button cButton color="light" size="sm" (click)="next()">Siguiente</button>
        <div class="text-muted small ms-2">Página {{ pageNo + 1 }} | Tamaño {{ pageSize }}</div>
      </div>
    </div>
    </c-card-body>
  </c-card>
</c-container>
