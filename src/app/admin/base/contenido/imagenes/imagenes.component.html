<c-container class="container-fluid">
  <c-card>
    <c-card-header class="d-flex align-items-center justify-content-between">
      <span>Imágenes</span>
    </c-card-header>
    <c-card-body [attr.aria-busy]="loading ? 'true' : null">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="text-muted small">Total {{ items.length }}</div>
        <div class="btn-group" role="group">
          <select cSelect [value]="pageSize" (change)="pageSize = +$any($event.target).value; search()">
            <option value="6">6</option>
            <option value="12">12</option>
            <option value="24">24</option>
          </select>
        </div>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="btn-group" role="group" aria-label="Filtros">
          <input cFormControl type="text" placeholder="Nombre" [(ngModel)]="filtroNombre" />
          <select cSelect [(ngModel)]="filtroMime">
            <option value="">Todos</option>
            <option value="image/jpeg">image/jpeg</option>
            <option value="image/png">image/png</option>
            <option value="image/gif">image/gif</option>
            <option value="image/webp">image/webp</option>
          </select>
          <input cFormControl type="date" [(ngModel)]="fechaDesde" />
          <input cFormControl type="date" [(ngModel)]="fechaHasta" />
          <button cButton color="secondary" size="sm" (click)="search()">Buscar</button>
          <button cButton color="light" size="sm" (click)="reset()">Limpiar</button>
        </div>
        <div class="btn-group" role="group">
          <button cButton color="light" size="sm" (click)="prev()" [disabled]="pageNo===0">Anterior</button>
          <button cButton color="light" size="sm" (click)="next()">Siguiente</button>
          <select cSelect class="ms-2" [(ngModel)]="pageSize" (ngModelChange)="search()">
            <option [ngValue]="6">6</option>
            <option [ngValue]="12">12</option>
            <option [ngValue]="24">24</option>
          </select>
          <input cFormControl type="number" min="1" [max]="(totalPages||1)" [(ngModel)]="pageNo" class="ms-2" />
          <button cButton color="secondary" size="sm" class="ms-1" (click)="load(pageNo)">Ir</button>
        </div>
      </div>
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
        <span>{{ error }}</span>
      <button cButton color="danger" size="sm" (click)="load()">Reintentar</button>
      </div>
    <div *ngIf="loading" class="py-3 text-center"><c-spinner></c-spinner></div>
    <div *ngIf="!loading">
      <c-row class="g-3">
        <c-col class="col-6 col-md-4 col-lg-3" *ngFor="let m of items">
          <c-card class="h-100">
            <img *ngIf="m.url" [src]="m.url" class="card-img-top img-fluid" [alt]="m.nombre || 'Imagen'">
            <c-card-body>
              <div class="fw-semibold text-truncate">{{ m.nombre }}</div>
              <div class="text-muted small">{{ m.fechaCreacion | date:'dd-MM-yyyy HH:mm' }}</div>
            </c-card-body>
          </c-card>
        </c-col>
      </c-row>
      <div *ngIf="items.length === 0" class="text-muted">Sin imágenes</div>
    </div>
    </c-card-body>
  </c-card>
</c-container>
