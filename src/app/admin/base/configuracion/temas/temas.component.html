<div class="card">
  <div class="card-header">
    Temas
  </div>
  <div class="card-body" [attr.aria-busy]="loading ? 'true' : null">
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
      <span>{{ error }}</span>
      <button class="btn btn-sm btn-danger" (click)="load()">Reintentar</button>
    </div>
    <div *ngIf="loading" class="py-3 text-center"><div class="spinner-border" role="status"><span class="visualmente-hidden">Cargando...</span></div></div>
    <div *ngIf="!loading">
      <table class="table table-hover" role="table">
        <thead><tr><th>Nombre</th><th>Activo</th><th>Esquema</th></tr></thead>
        <tbody>
          <tr *ngFor="let t of temas">
            <td>{{ t.nombre }}</td>
            <td>{{ t.activo ? 'Sí' : 'No' }}</td>
            <td>{{ t.esquemaColor }}</td>
          </tr>
          <tr *ngIf="temas.length === 0"><td colspan="3" class="text-muted text-center">Sin temas</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
