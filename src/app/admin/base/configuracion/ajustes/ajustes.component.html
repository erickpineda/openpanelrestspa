<c-container class="container-fluid">
  <c-card>
    <c-card-header>
      Ajustes
    </c-card-header>
    <c-card-body [attr.aria-busy]="loading ? 'true' : null">
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
        <span>{{ error }}</span>
      <button cButton color="danger" size="sm" (click)="load()">Reintentar</button>
      </div>
    <div *ngIf="loading" class="py-3 text-center"><c-spinner></c-spinner></div>
    <div *ngIf="!loading">
      <div class="d-flex justify-content-end mb-2">
        <button cButton color="primary" size="sm" (click)="openNew()"><svg cIcon name="cilPlus"></svg> Nuevo</button>
      </div>
      <table class="table table-hover" role="table">
        <thead><tr><th>Categoria</th><th>Clave</th><th>Valor</th><th>Acciones</th></tr></thead>
        <tbody>
          <tr *ngFor="let a of ajustes">
            <td>{{ a.categoria }}</td>
            <td>{{ a.clave }}</td>
            <td class="text-truncate">{{ a.valor }}</td>
            <td>
              <div class="btn-group">
                <button cButton color="secondary" size="sm" (click)="openEdit(a)"><svg cIcon name="cilPencil"></svg></button>
                <button cButton color="danger" size="sm" (click)="delete(a)"><svg cIcon name="cilTrash"></svg></button>
              </div>
            </td>
          </tr>
          <tr *ngIf="ajustes.length === 0"><td colspan="3" class="text-muted text-center">Sin ajustes</td></tr>
        </tbody>
      </table>
    </div>
  </c-card-body>
  </c-card>
</c-container>

<c-modal [visible]="modalVisible" (visibleChange)="modalVisible = $event">
  <c-modal-header>
    <h5 cModalTitle>{{ editItem ? 'Editar Ajuste' : 'Nuevo Ajuste' }}</h5>
  </c-modal-header>
  <c-modal-body>
    <form [formGroup]="form">
      <div class="mb-3">
        <label class="form-label">Categoria</label>
        <input cFormControl type="text" formControlName="categoria" />
      </div>
      <div class="mb-3">
        <label class="form-label">Clave</label>
        <input cFormControl type="text" formControlName="clave" />
      </div>
      <div class="mb-3">
        <label class="form-label">Valor</label>
        <input cFormControl type="text" formControlName="valor" />
      </div>
    </form>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="closeModal()">Cancelar</button>
    <button cButton color="primary" [disabled]="form.invalid" (click)="save()">Guardar</button>
  </c-modal-footer>
</c-modal>
