<div class="card" aria-live="polite">
  <div class="card-header d-flex align-items-center justify-content-between">
    <span>Usuarios</span>
    <div class="btn-toolbar gap-2">
      <div class="btn-group" role="group" aria-label="Filtros">
        <input cFormControl type="text" placeholder="Usuario" [(ngModel)]="filtroUsuario" />
        <select cSelect [(ngModel)]="filtroRolId">
          <option [ngValue]="null">Rol</option>
          <option *ngFor="let r of roles" [ngValue]="r.id">{{ r.nombre }}</option>
        </select>
        <select cSelect [(ngModel)]="filtroEmailConfirmado">
          <option [ngValue]="null">Email confirmado</option>
          <option [ngValue]="true">Sí</option>
          <option [ngValue]="false">No</option>
        </select>
        <button cButton color="secondary" size="sm" (click)="search()">Buscar</button>
        <button cButton color="light" size="sm" (click)="reset()">Limpiar</button>
      </div>
      <div class="btn-group" role="group" aria-label="Acciones">
        <button cButton color="primary" size="sm">Nuevo</button>
      </div>
    </div>
  </div>
  <div class="card-body" [attr.aria-busy]="loading ? 'true' : null">
    <div *ngIf="error" class="alert alert-danger d-flex align-items-center justify-content-between my-2" role="alert">
      <span>{{ error }}</span>
      <button cButton color="danger" size="sm" (click)="load()">Reintentar</button>
    </div>
    <div *ngIf="loading"><c-spinner></c-spinner></div>
    <div *ngIf="!loading">
      <table class="table table-sm" role="table">
        <thead>
          <tr><th>Usuario</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of usuarios">
            <td>{{ u.username }}</td>
            <td>{{ u.nombre }} {{ u.apellido }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.idRol }}</td>
            <td>
              <div class="btn-group">
                <button cButton color="secondary" size="sm" (click)="openEdit(u)">Editar</button>
                <button cButton color="danger" size="sm" (click)="delete(u)">Borrar</button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div *ngIf="usuarios.length === 0" class="text-muted">Sin usuarios</div>
      <div class="d-flex justify-content-between align-items-center mt-2">
        <div>
          <button cButton color="light" size="sm" (click)="prev()">Anterior</button>
          <button cButton color="light" size="sm" (click)="next()">Siguiente</button>
        </div>
        <div class="text-muted small">Página {{ pageNo + 1 }} | Tamaño {{ pageSize }} | Total {{ totalElements }}</div>
      </div>
    </div>
  </div>
</div>

<c-modal id="editUserModal" [visible]="editModalVisible" (visibleChange)="editModalVisible = $event">
  <c-modal-header>
    <h5 cModalTitle>Editar Usuario</h5>
  </c-modal-header>
  <c-modal-body>
    <div *ngIf="editUser">
      <div class="mb-2">
        <label class="form-label">Nombre</label>
        <input cFormControl type="text" [(ngModel)]="editUser.nombre" />
      </div>
      <div class="mb-2">
        <label class="form-label">Apellido</label>
        <input cFormControl type="text" [(ngModel)]="editUser.apellido" />
      </div>
      <div class="mb-2">
        <label class="form-label">Email</label>
        <input cFormControl type="email" [(ngModel)]="editUser.email" />
      </div>
      <div class="mb-2">
        <label class="form-label">Rol</label>
        <select cSelect [(ngModel)]="editUser.idRol">
          <option *ngFor="let r of roles" [ngValue]="r.id">{{ r.nombre }}</option>
        </select>
      </div>
    </div>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="closeEdit()">Cerrar</button>
    <button cButton color="primary" (click)="saveEdit()">Guardar</button>
  </c-modal-footer>
</c-modal>
