<c-modal
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  size="lg"
  backdrop="static"
  id="privilegioFormModal"
>
  <c-modal-header class="border-bottom-0 pb-0">
    <h5 cModalTitle class="fw-bold">{{ isEditing ? 'Editar Privilegio' : 'Nuevo Privilegio' }}</h5>
  </c-modal-header>
  <c-modal-body class="py-4">
    @if (privilegio) {
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted">Nombre</label>
           <input
            cFormControl
            type="text"
            [value]="privilegio.nombre || ''"
            (input)="onNombreInput($any($event.target).value)"
            [class.is-invalid]="!privilegio.nombre"
            placeholder="Ej. Gestionar Usuarios"
          />
           @if (!privilegio.nombre) {
            <div class="invalid-feedback d-block">Nombre requerido</div>
          }
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold text-muted">Código</label>
          <input
            cFormControl
            type="text"
            [value]="privilegio.codigo || ''"
            (input)="onCodigoInput($any($event.target).value)"
            [disabled]="isEditing"
            [class.is-invalid]="!privilegio.codigo"
            maxlength="20"
            placeholder="Ej. USERS_MANAGE"
            class="text-uppercase"
          />
           @if (!privilegio.codigo) {
            <div class="invalid-feedback d-block">Código requerido (máx 20 caracteres)</div>
          }
          @if (!isEditing) {
            <div class="form-text text-muted small">
              Se genera automáticamente si se deja vacío.
            </div>
          }
        </div>

        <div class="col-12">
          <label class="form-label small fw-bold text-muted">Descripción</label>
          <textarea
            cFormControl
            rows="2"
            [value]="privilegio.descripcion || ''"
            (input)="privilegio && (privilegio.descripcion = $any($event.target).value)"
            placeholder="Descripción opcional del privilegio..."
          ></textarea>
        </div>
      </div>
    }
  </c-modal-body>
  <c-modal-footer class="border-top-0 pt-0 pb-4">
    <button cButton color="secondary" variant="ghost" (click)="close()">Cancelar</button>
    <button cButton color="primary" class="px-4" [disabled]="!isFormValid()" (click)="save()">
      {{ isEditing ? 'Guardar Cambios' : 'Crear Privilegio' }}
    </button>
  </c-modal-footer>
</c-modal>
