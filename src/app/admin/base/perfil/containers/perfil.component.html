<c-row *ngIf="usuario && !loading">
  <c-col xs="12" md="4">
    <c-card class="mb-4">
      <c-card-header>Perfil</c-card-header>
      <c-card-body class="text-center">
        <div class="mb-3 position-relative d-inline-block">
            <img [src]="(usuario.imagen && usuario.imagen.length > 0) ? usuario.imagen[0] : './assets/img/avatars/2.jpg'" 
                 class="rounded-circle img-thumbnail" 
                 width="150" height="150" 
                 alt="Avatar"
                 style="object-fit: cover;">
            <button cButton color="primary" size="sm" class="position-absolute bottom-0 end-0 rounded-circle"
                    (click)="triggerFileInput(fileInput)" [disabled]="uploading">
              <svg cIcon name="cil-camera"></svg>
            </button>
            <input #fileInput type="file" (change)="onFileSelected($event)" accept="image/*" hidden>
        </div>
        <h4>{{ usuario.nombre }} {{ usuario.apellido }}</h4>
        <p class="text-muted">{{ usuario.email }}</p>
        <c-badge color="info">{{ usuario.username }}</c-badge>
      </c-card-body>
    </c-card>
  </c-col>

  <c-col xs="12" md="8">
    <c-card class="mb-4">
      <c-card-header>
        <strong>Configuración de Cuenta</strong>
      </c-card-header>
      <c-card-body>
         <c-nav variant="tabs">
            <a [active]="true" [cTabContent]="tabContent" [routerLink] [tabPaneIdx]="0" cNavLink>Información Personal</a>
            <a [cTabContent]="tabContent" [routerLink] [tabPaneIdx]="1" cNavLink>Preferencias</a>
            <a [cTabContent]="tabContent" [routerLink] [tabPaneIdx]="2" cNavLink>Actividad Reciente</a>
         </c-nav>
         <c-tab-content #tabContent="cTabContent" [activeTabPaneIdx]="0">
            <c-tab-pane class="p-3">
               <app-perfil-form [usuario]="usuario" (save)="onSave($event)"></app-perfil-form>
            </c-tab-pane>
            <c-tab-pane class="p-3">
               <app-perfil-preferences [usuario]="usuario" (save)="onSave($event)"></app-perfil-preferences>
            </c-tab-pane>
            <c-tab-pane class="p-3">
               <app-perfil-activity [usuarioId]="usuario.idUsuario"></app-perfil-activity>
            </c-tab-pane>
         </c-tab-content>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>

<div *ngIf="loading" class="d-flex justify-content-center align-items-center" style="height: 50vh;">
  <c-spinner color="primary"></c-spinner>
</div>
