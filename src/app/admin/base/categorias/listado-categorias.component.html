<c-card>
  <c-card-header class="d-flex align-items-center">
    <c-col [sm]="6">
      <h6 cCardTitle>Listado de Categorias</h6>
    </c-col>
    <c-col [sm]="6">
      <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <button cButton color="light" size="sm">
          <svg cIcon name="cilPrint" style="padding-right: 2px" size="sm" title="Imprimir"></svg>
            Imprimir
        </button>
      </div>
    </c-col>
  </c-card-header>
  <c-card-body>
    <div class="d-flex justify-content-between align-items-end">
      <h5 cCardTitle>Listado de Categorias</h5>
      <div class="hstack gap-3">
        <button cButton color="success" size="sm" routerLink="crear">
          <svg cIcon name="cilPencil" style="padding-right: 2px" size="sm" title="Crear nueva Categoria"></svg>
          Crear nueva Categoria
        </button>
      </div>
    </div>
    <hr>
    
    <div *ngIf="cargando" class="text-center py-4">
      <c-spinner size="sm"></c-spinner>
      <p class="mt-2">Cargando categorías...</p>
    </div>
    <table cTable hover *ngIf="!cargando">
      <thead cTableColor="dark">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Nombre</th>
          <th scope="col">Descripción</th>
          <th scope="col" class="col">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let categ of listaCategorias; trackBy: trackByCategoriaId">
          <td scope="row">{{categ.idCategoria}}</td>
          <td>{{categ.nombre}}</td>
          <td>{{categ.descripcion}}</td>
          <td>
            <div class="btn-group" role="group" aria-label="Acciones de categoría">
              <button cButton color="warning" size="sm"
                      (click)="editarCategoria(categ.idCategoria)"
                      [attr.aria-label]="'Editar categoría ' + categ.nombre"
                      [title]="'Editar categoría ' + categ.nombre">
                <svg cIcon name="cilPen" size="sm"></svg>
              </button>
              <button cButton color="danger" size="sm"
                      (click)="borrarCategoria(categ.idCategoria)"
                      [attr.aria-label]="'Borrar categoría ' + categ.nombre"
                      [title]="'Borrar categoría ' + categ.nombre">
                <svg cIcon name="cilTrash" size="sm"></svg>
              </button>
            </div>
          </td>
        </tr>
        <tr *ngIf="listaCategorias.length === 0">
          <td colspan="4" class="text-center py-4">
            {{ errorMsg || 'No se han encontrado registros en el sistema...' }}
          </td>
        </tr>
      </tbody>
    </table>
  </c-card-body>
</c-card>
