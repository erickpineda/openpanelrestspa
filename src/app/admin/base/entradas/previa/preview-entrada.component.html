<c-card class="preview-entrada-card">
  <c-card-header>
    <div class="d-flex justify-content-between align-items-center w-100">
      <div>
        <h3 class="h5 mb-0">{{ tituloMostrar || 'Sin título' }}</h3>
        <small *ngIf="categoriasMostrar?.length" class="text-muted">
          Categorías:
          <span *ngFor="let c of categoriasMostrar; let last = last">
            {{ c.nombre || c }}<span *ngIf="!last">, </span>
          </span>
        </small>
      </div>

      <div class="d-flex gap-2" *ngIf="mostrarBotonesAccion">
        <button cButton color="secondary" size="sm" (click)="onEditar()">Editar</button>
        <button cButton color="danger" size="sm" (click)="onCerrar()">Cerrar</button>
        <button cButton color="success" size="sm" (click)="onPublicar()">Publicar</button>
      </div>
    </div>
  </c-card-header>

  <c-card-body>
    <div class="preview-entrada-contenido" [innerHTML]="contenidoSeguro"></div>
  </c-card-body>
</c-card>
