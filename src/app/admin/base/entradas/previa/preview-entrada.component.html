<c-card class="mb-4 shadow-sm border-0 preview-entrada-card">
  <c-card-header class="bg-white border-bottom py-3">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 w-100">
      <div>
        <h3 class="h5 mb-1 fw-bold text-gray-800">{{ tituloMostrar || 'Sin título' }}</h3>
        @if (categoriasMostrar.length) {
          <div class="text-muted small d-flex align-items-center flex-wrap gap-1">
            <svg cIcon name="cilFolderOpen" size="sm" class="text-secondary"></svg>
            <span class="me-1">Categorías:</span>
            @for (c of categoriasMostrar; track c; let last = $last) {
              <c-badge color="light" class="text-secondary border border-light-subtle">
                {{ c.nombre || c }}
              </c-badge>
            }
          </div>
        }
      </div>

      @if (mostrarBotonesAccion) {
        <div class="d-flex flex-wrap gap-2">
          <button cButton color="warning" variant="ghost" size="sm" (click)="onEditar()" class="d-flex align-items-center">
            <svg cIcon name="cilPencil" size="sm" class="me-2"></svg>
            Editar
          </button>
          <button cButton color="danger" variant="ghost" size="sm" (click)="onCerrar()" class="d-flex align-items-center">
            <svg cIcon name="cilX" size="sm" class="me-2"></svg>
            Cerrar
          </button>
          <button cButton color="success" size="sm" (click)="onPublicar()" class="d-flex align-items-center text-white shadow-sm">
            <svg cIcon name="cilPaperPlane" size="sm" class="me-2"></svg>
            Publicar
          </button>
        </div>
      }
    </div>
  </c-card-header>

  <c-card-body class="p-4 bg-light bg-opacity-10">
    <div class="bg-white p-4 rounded shadow-sm border preview-entrada-contenido" [innerHTML]="contenidoSeguro"></div>
  </c-card-body>
</c-card>
