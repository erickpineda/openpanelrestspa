<c-row>
  <c-col xs="12">
    <c-card class="shadow-sm mb-4 border-0">
      <c-card-header class="bg-white py-3 border-bottom">
        <div class="d-flex align-items-center gap-2">
          <div class="bg-primary bg-opacity-10 p-2 rounded">
            <svg cIcon name="cilStorage" size="lg" class="text-primary"></svg>
          </div>
          <div>
            <h5 class="mb-0 text-primary fw-bold">Mantenimiento de Base de Datos</h5>
            <small class="text-muted">Optimización y copias de seguridad del sistema</small>
          </div>
        </div>
      </c-card-header>
      <c-card-body class="p-4">
        <div class="d-flex align-items-center mb-4 p-3 bg-light rounded border">
          <span class="me-2 text-secondary fw-semibold">Estado actual:</span>
          <c-badge color="success" shape="rounded-pill" class="fs-6 px-3 py-2 shadow-sm">{{ status }}</c-badge>
        </div>
        
        <div class="d-flex flex-wrap gap-3">
          <button
            cButton
            color="primary"
            class="text-white shadow-sm py-2 px-3"
            [disabled]="optimizeRunning"
            (click)="runOptimize()"
          >
            <div class="d-flex align-items-center">
              @if (optimizeRunning) {
                <c-spinner size="sm" class="me-2"></c-spinner>
                <span>Optimizando...</span>
              } @else {
                <svg cIcon name="cilSpeedometer" size="sm" class="me-2"></svg>
                <span>Optimizar Base de Datos</span>
              }
            </div>
          </button>
          
          <button
            cButton
            color="secondary"
            variant="outline"
            class="shadow-sm py-2 px-3"
            [disabled]="backupRunning"
            (click)="runBackup()"
          >
            <div class="d-flex align-items-center">
              @if (backupRunning) {
                <c-spinner size="sm" class="me-2"></c-spinner>
                <span>Generando Backup...</span>
              } @else {
                <svg cIcon name="cilSave" size="sm" class="me-2"></svg>
                <span>Realizar Backup</span>
              }
            </div>
          </button>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
