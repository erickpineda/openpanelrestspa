<c-row>
  <c-col xs="12">
    <c-card class="mb-4 border-top-3 border-top-primary shadow-sm">
      <c-card-header class="bg-white border-bottom py-3">
        <div class="d-flex align-items-center gap-2">
          <svg cIcon name="cilStorage" size="lg" class="text-primary"></svg>
          <h4 class="mb-0 text-primary">{{ 'ADMIN.DATABASE.TITLE' | translate }}</h4>
        </div>
      </c-card-header>
      <c-card-body class="p-4">
        <div class="bg-light bg-opacity-50 p-3 rounded-3 mb-4 border">
          <div class="d-flex align-items-center">
            <span class="me-2 text-secondary fw-semibold">{{ 'ADMIN.DATABASE.CURRENT_STATUS' | translate }}</span>
            <c-badge color="success" shape="rounded-pill" class="fs-6 px-3 py-2 shadow-sm">{{ status }}</c-badge>
          </div>
        </div>
        
        <div class="d-flex flex-wrap gap-3">
          <button
            cButton
            color="primary"
            class="text-white shadow-sm py-2 px-3"
            [disabled]="optimizeRunning"
            (click)="runOptimize()"
          >
            <div class="d-flex align-items-center">
              @if (optimizeRunning) {
                <c-spinner size="sm" class="me-2"></c-spinner>
                <span>{{ 'ADMIN.DATABASE.OPTIMIZING' | translate }}</span>
              } @else {
                <svg cIcon name="cilSpeedometer" size="sm" class="me-2"></svg>
                <span>{{ 'ADMIN.DATABASE.OPTIMIZE' | translate }}</span>
              }
            </div>
          </button>
          
          <button
            cButton
            color="secondary"
            variant="outline"
            class="shadow-sm py-2 px-3"
            [disabled]="backupRunning"
            (click)="runBackup()"
          >
            <div class="d-flex align-items-center">
              @if (backupRunning) {
                <c-spinner size="sm" class="me-2"></c-spinner>
                <span>{{ 'ADMIN.DATABASE.BACKING_UP' | translate }}</span>
              } @else {
                <svg cIcon name="cilSave" size="sm" class="me-2"></svg>
                <span>{{ 'ADMIN.DATABASE.BACKUP' | translate }}</span>
              }
            </div>
          </button>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
