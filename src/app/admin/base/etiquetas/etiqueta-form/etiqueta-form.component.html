<form [formGroup]="form" (ngSubmit)="onSubmit()" role="form" [attr.aria-label]="isEdit ? 'Formulario de edición de etiqueta' : 'Formulario de creación de etiqueta'" data-testid="etiqueta-form">
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre <span class="text-danger">*</span></label>
    <input type="text" id="nombre" class="form-control" formControlName="nombre" [class.is-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched" [attr.aria-invalid]="form.get('nombre')?.invalid && form.get('nombre')?.touched" [attr.aria-describedby]="form.get('nombre')?.invalid && form.get('nombre')?.touched ? 'nombre-error' : null" [attr.aria-label]="'Ingrese el nombre de la etiqueta'" placeholder="Ingrese el nombre de la etiqueta" maxlength="50" data-testid="input-nombre">
    <div id="nombre-error" class="invalid-feedback" *ngIf="form.get('nombre')?.invalid && form.get('nombre')?.touched">
      <span *ngIf="form.get('nombre')?.errors?.['required']">El nombre es requerido</span>
      <span *ngIf="form.get('nombre')?.errors?.['maxlength']">El nombre no puede exceder 50 caracteres</span>
    </div>
  </div>

  <div class="mb-3">
    <label for="descripcion" class="form-label">Descripción</label>
    <textarea id="descripcion" class="form-control" formControlName="descripcion" [class.is-invalid]="form.get('descripcion')?.invalid && form.get('descripcion')?.touched" [attr.aria-label]="'Ingrese una descripción opcional para la etiqueta'" rows="3" placeholder="Ingrese una descripción opcional para la etiqueta" maxlength="200" data-testid="input-descripcion"></textarea>
    <div class="form-text" data-testid="contador-descripcion">{{ form.get('descripcion')?.value?.length || 0 }}/200 caracteres</div>
    <div id="descripcion-error" class="invalid-feedback" *ngIf="form.get('descripcion')?.invalid && form.get('descripcion')?.touched">La descripción no puede exceder 200 caracteres</div>
  </div>

  <div class="mb-4">
    <label class="form-label">Color <span class="text-danger">*</span></label>
    <div class="d-flex flex-wrap gap-2">
      <div *ngFor="let colorOption of colores" class="form-check form-check-inline">
        <input class="form-check-input" type="radio" [id]="'color-' + colorOption.value" formControlName="color" [value]="colorOption.value" [checked]="form.get('color')?.value === colorOption.value" [attr.data-testid]="'color-' + colorOption.value">
        <label class="form-check-label d-flex align-items-center" [for]="'color-' + colorOption.value">
          <span [style.background-color]="colorOption.value" class="rounded-circle me-2" style="width: 16px; height: 16px; display: inline-block;"></span>
          {{ colorOption.label }}
        </label>
      </div>
    </div>
    <div class="invalid-feedback d-block" *ngIf="form.get('color')?.invalid && form.get('color')?.touched">Debe seleccionar un color</div>
  </div>

  <div class="d-flex justify-content-end gap-2">
    <button type="button" class="btn btn-secondary" (click)="onCancel()" [disabled]="loading" [attr.aria-label]="'Cancelar'" data-testid="btn-cancelar">Cancelar</button>
    <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading" [attr.aria-label]="isEdit ? 'Actualizar etiqueta' : 'Crear etiqueta'" data-testid="btn-guardar">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      <span *ngIf="!loading">{{ isEdit ? 'Actualizar' : 'Crear' }}</span>
    </button>
  </div>
</form>
