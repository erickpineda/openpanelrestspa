<c-modal [visible]="visible" (visibleChange)="handleVisibleChange($event)" backdrop="static">
  <c-modal-header class="bg-danger text-white">
    <h5 cModalTitle>{{ 'AUTO.CONFIRMAR_ELIMINACI_N' | translate }}</h5>
    <button (click)="cerrarModal()" cButtonClose white></button>
  </c-modal-header>
  <c-modal-body>
    <p>{{ 'AUTO.EST_S_SEGURO_DE_QUE_DESEAS_ELI' | translate }}<strong>{{ etiqueta?.nombre }}</strong>?</p>
    <p class="text-danger small mb-0">
      <svg cIcon name="cilWarning" class="me-1"></svg> Esta acción no se puede deshacer.
    </p>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="cerrarModal()">{{ 'AUTO.CANCELAR' | translate }}</button>
    <button cButton color="danger" (click)="confirmar()" [disabled]="loading">
      @if (loading) {
        <c-spinner size="sm" class="me-1"></c-spinner>
      }
      Eliminar
    </button>
  </c-modal-footer>
</c-modal>
