<c-modal [visible]="visible" (visibleChange)="handleVisibleChange($event)" size="lg" backdrop="static" alignment="center">
  <c-modal-header>
    <h5 cModalTitle>{{ 'AUTO.EDITAR_ETIQUETA' | translate }}</h5>
    <button (click)="cerrarModal()" cButtonClose></button>
  </c-modal-header>
  <c-modal-body>
    <app-etiqueta-form
      [etiqueta]="etiqueta"
      [isEdit]="true"
      (save)="onGuardar()"
      (cancel)="cerrarModal()"
    ></app-etiqueta-form>
  </c-modal-body>
</c-modal>
