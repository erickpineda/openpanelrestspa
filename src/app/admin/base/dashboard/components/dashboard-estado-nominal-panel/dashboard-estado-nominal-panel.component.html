<c-card>
  <c-card-header>
    <c-row class="align-items-center g-2">
      <c-col xs="12" md="6">
        <h6 class="mb-0">Serie por estado nominal</h6>
      </c-col>
      <c-col
        xs="12"
        md="6"
        class="d-flex justify-content-md-end justify-content-start flex-wrap gap-2"
      >
        <div class="d-flex flex-wrap gap-2" aria-label="Tipo">
          <button
            cButton
            color="secondary"
            size="sm"
            [disabled]="estadoNominalChartType === 'line'"
            (click)="setChartType.emit('line')"
          >
            Línea
          </button>
          <button
            cButton
            color="secondary"
            size="sm"
            [disabled]="estadoNominalChartType === 'bar'"
            (click)="setChartType.emit('bar')"
          >
            Barras
          </button>
          <button
            cButton
            color="secondary"
            size="sm"
            [disabled]="estadoNominalChartType !== 'bar'"
            (click)="toggleStacked.emit()"
          >
            {{ estadoNominalStacked ? 'Apiladas' : 'No apiladas' }}
          </button>
          <button
            cButton
            color="secondary"
            size="sm"
            (click)="downloadCsv.emit()"
            title="Descargar serie por estado en CSV"
            [attr.aria-label]="'Descargar serie por estado en CSV'"
            data-testid="btn-csv-split-estado-nombre"
          >
            CSV
          </button>
        </div>
      </c-col>
    </c-row>
  </c-card-header>
  <c-card-body>
    @if (errorSplitEstadoNombre) {
      <div
        class="alert alert-danger d-flex align-items-center justify-content-between my-2"
        role="alert"
        aria-live="assertive"
      >
        <span>{{ errorSplitEstadoNombre }}</span>
        <button
          cButton
          color="danger"
          size="sm"
          class="retry-btn-split-nominal"
          (click)="retry.emit()"
        >
          Reintentar
        </button>
      </div>
    }
    @if (seriesEntriesSplitEstadoNombreData) {
      <div class="chart-container mb-2">
        <app-dashboard-chart
          [data]="seriesEntriesSplitEstadoNombreData"
          [type]="estadoNominalChartType"
          [options]="estadoNominalChartOptions"
        ></app-dashboard-chart>
      </div>
    }
    @if (!seriesEntriesSplitEstadoNombreData) {
      <div class="text-muted small">Sin datos</div>
    }
  </c-card-body>
</c-card>
