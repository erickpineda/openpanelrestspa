<div class="d-flex flex-column">
  <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-2 bg-light p-2 rounded border">
    <div class="d-flex align-items-center gap-2">
      <svg cIcon name="cilBarChart" class="text-secondary"></svg>
      <h6 class="mb-0 fw-bold text-secondary text-uppercase small">Serie por estado nominal</h6>
    </div>
    <div class="d-flex flex-wrap gap-2" aria-label="Tipo">
      <div class="btn-group shadow-sm" role="group">
        <button
          cButton
          color="white"
          variant="outline"
          size="sm"
          [active]="estadoNominalChartType === 'line'"
          (click)="setChartType.emit('line')"
        >
          Línea
        </button>
        <button
          cButton
          color="white"
          variant="outline"
          size="sm"
          [active]="estadoNominalChartType === 'bar'"
          (click)="setChartType.emit('bar')"
        >
          Barras
        </button>
      </div>
      
      <button
        cButton
        color="white"
        variant="outline"
        size="sm"
        class="shadow-sm"
        [disabled]="estadoNominalChartType !== 'bar'"
        (click)="toggleStacked.emit()"
      >
        {{ estadoNominalStacked ? 'Apiladas' : 'No apiladas' }}
      </button>
      <button
        cButton
        color="white"
        variant="outline"
        size="sm"
        class="shadow-sm"
        (click)="downloadCsv.emit()"
        title="Descargar CSV"
        [attr.aria-label]="'Descargar CSV'"
        data-testid="btn-csv-split-estado-nombre"
      >
        <svg cIcon name="cilCloudDownload" size="sm" class="text-secondary"></svg>
      </button>
    </div>
  </div>

  @if (errorSplitEstadoNombre) {
    <c-alert color="danger" class="d-flex align-items-center justify-content-between my-2 py-2 shadow-sm border-0">
      <div class="d-flex align-items-center gap-2">
        <svg cIcon name="cilWarning" size="sm"></svg>
        <span class="small">{{ errorSplitEstadoNombre }}</span>
      </div>
      <button
        cButton
        color="danger"
        variant="ghost"
        size="sm"
        class="retry-btn-split-nominal"
        (click)="retry.emit()"
      >
        Reintentar
      </button>
    </c-alert>
  }

  @if (seriesEntriesSplitEstadoNombreData) {
    <div class="chart-container mb-2 p-3 bg-white rounded border shadow-sm" aria-live="polite" aria-busy="false">
      <app-dashboard-chart
        [data]="seriesEntriesSplitEstadoNombreData"
        [type]="estadoNominalChartType"
        [options]="estadoNominalChartOptions"
      ></app-dashboard-chart>
    </div>
  }
  @if (!seriesEntriesSplitEstadoNombreData) {
    <div class="text-center text-muted py-5 bg-white rounded border border-dashed">
      <div class="d-flex flex-column align-items-center justify-content-center opacity-50">
        <svg cIcon name="cilChartLine" size="4xl" class="text-muted mb-3"></svg>
        <small class="fw-bold">Sin datos disponibles</small>
      </div>
    </div>
  }
</div>
