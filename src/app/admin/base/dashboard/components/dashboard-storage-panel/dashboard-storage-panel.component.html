<div class="d-flex flex-column">
  <div class="d-flex justify-content-end mb-3">
    <button
      cButton
      color="secondary"
      variant="ghost"
      size="sm"
      (click)="downloadCsv.emit()"
      title="Descargar almacenamiento en CSV"
      [attr.aria-label]="'Descargar almacenamiento en CSV'"
      data-testid="btn-csv-storage"
    >
      <svg cIcon name="cilCloudDownload" size="sm" class="me-1"></svg>
      CSV
    </button>
  </div>

  @if (loadingStorage) {
    <div class="d-flex justify-content-center py-4">
      <c-spinner color="warning"></c-spinner>
    </div>
  }

  <div class="bg-light bg-opacity-50 p-3 rounded border border-dashed text-center">
    <div class="mb-2">
      <span class="text-muted small text-uppercase fw-bold">{{ 'AUTO.FICHEROS_TOTALES' | translate }}</span>
      <h3 class="text-dark fw-bold mb-0">{{ storage?.totalFiles || 0 }}</h3>
    </div>
    <hr class="my-2 opacity-25">
    <div>
      <span class="text-muted small text-uppercase fw-bold">{{ 'AUTO.USO_DE_DISCO' | translate }}</span>
      <h4 class="text-warning fw-bold mb-0">
        {{ formatBytesFn ? formatBytesFn(storage?.storageBytes) : (storage?.storageBytes | number) }}
      </h4>
    </div>
  </div>
</div>
