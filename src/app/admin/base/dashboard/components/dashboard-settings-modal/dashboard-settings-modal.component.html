<c-modal [visible]="visible" (visibleChange)="visibleChange.emit($event)" alignment="center">
  <c-modal-header>
    <h5 cModalTitle>{{ 'AUTO.PAR_METROS_DEL_DASHBOARD' | translate }}</h5>
  </c-modal-header>
  <c-modal-body>
    <c-row>
      <c-col lg="6">
        <label class="form-label">{{ 'AUTO.D_AS_DE_SERIE' | translate }}</label>
        <input cFormControl type="number" min="1" max="365" [(ngModel)]="settings.seriesDays" />
      </c-col>
      <c-col lg="6">
        <label class="form-label">{{ 'AUTO.GRANULARIDAD' | translate }}</label>
        <select cSelect [(ngModel)]="settings.seriesGranularity">
          <option [ngValue]="'hour'">{{ 'AUTO.HORA' | translate }}</option>
          <option [ngValue]="'day'">{{ 'AUTO.D_A' | translate }}</option>
          <option [ngValue]="'week'">{{ 'AUTO.SEMANA' | translate }}</option>
          <option [ngValue]="'month'">{{ 'AUTO.MES' | translate }}</option>
        </select>
      </c-col>
      <c-col lg="6">
        <label class="form-label">{{ 'AUTO.TOP_L_MITE' | translate }}</label>
        <input cFormControl type="number" min="1" max="200" [(ngModel)]="settings.topLimit" />
      </c-col>
      <c-col lg="6">
        <label class="form-label">{{ 'AUTO.PERIODO_TOP_D_AS' | translate }}</label>
        <select cSelect [(ngModel)]="settings.topPeriodDays">
          <option [ngValue]="7">7</option>
          <option [ngValue]="30">{{ 'AUTO.30' | translate }}</option>
          <option [ngValue]="90">{{ 'AUTO.90' | translate }}</option>
        </select>
      </c-col>
      <c-col lg="12">
        <hr />
        <div class="small text-muted mb-2">{{ 'AUTO.RANGO_EXACTO_PARA_TOP_OPCIONAL' | translate }}</div>
      </c-col>
      <c-col lg="6">
        <label class="form-label" for="topStartDate">{{ 'AUTO.FECHA_INICIO' | translate }}</label>
        <input
          id="topStartDate"
          cFormControl
          type="date"
          [(ngModel)]="settings.topStartDate"
          aria-describedby="topRangeHelp"
        />
      </c-col>
      <c-col lg="6">
        <label class="form-label" for="topEndDate">{{ 'AUTO.FECHA_FIN' | translate }}</label>
        <input
          id="topEndDate"
          cFormControl
          type="date"
          [(ngModel)]="settings.topEndDate"
          aria-describedby="topRangeHelp"
        />
      </c-col>
      <c-col lg="12">
        <div id="topRangeHelp" class="form-text">
          Si se establece rango, se usará en los Top en lugar del periodo.
        </div>
      </c-col>
      @if (clearFeedback) {
        <c-col lg="12" aria-live="polite">
          <div class="alert alert-info py-1 px-2 mb-0">{{ clearFeedback }}</div>
        </c-col>
      }
    </c-row>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="onClose()">{{ 'AUTO.CANCELAR' | translate }}</button>
    <button
      cButton
      color="warning"
      class="settings-clear-btn"
      (click)="onReset()"
      title="Restablecer campos a valores iniciales"
      [attr.aria-label]="'Limpiar campos'"
    >
      Limpiar
    </button>
    <button cButton color="primary" (click)="onApply()">{{ 'AUTO.APLICAR' | translate }}</button>
  </c-modal-footer>
</c-modal>
