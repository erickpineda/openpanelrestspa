<c-modal [visible]="visible" (visibleChange)="visibleChange.emit($event)" alignment="center">
  <c-modal-header>
    <h5 cModalTitle>Parámetros del Dashboard</h5>
  </c-modal-header>
  <c-modal-body>
    <c-row>
      <c-col lg="6">
        <label class="form-label">Días de serie</label>
        <input cFormControl type="number" min="1" max="365" [(ngModel)]="settings.seriesDays" />
      </c-col>
      <c-col lg="6">
        <label class="form-label">Granularidad</label>
        <select cSelect [(ngModel)]="settings.seriesGranularity">
          <option [ngValue]="'hour'">Hora</option>
          <option [ngValue]="'day'">Día</option>
          <option [ngValue]="'week'">Semana</option>
          <option [ngValue]="'month'">Mes</option>
        </select>
      </c-col>
      <c-col lg="6">
        <label class="form-label">Top límite</label>
        <input cFormControl type="number" min="1" max="200" [(ngModel)]="settings.topLimit" />
      </c-col>
      <c-col lg="6">
        <label class="form-label">Periodo Top (días)</label>
        <select cSelect [(ngModel)]="settings.topPeriodDays">
          <option [ngValue]="7">7</option>
          <option [ngValue]="30">30</option>
          <option [ngValue]="90">90</option>
        </select>
      </c-col>
      <c-col lg="12">
        <hr />
        <div class="small text-muted mb-2">Rango exacto para Top (opcional)</div>
      </c-col>
      <c-col lg="6">
        <label class="form-label" for="topStartDate">Fecha inicio</label>
        <input
          id="topStartDate"
          cFormControl
          type="date"
          [(ngModel)]="settings.topStartDate"
          aria-describedby="topRangeHelp"
        />
      </c-col>
      <c-col lg="6">
        <label class="form-label" for="topEndDate">Fecha fin</label>
        <input
          id="topEndDate"
          cFormControl
          type="date"
          [(ngModel)]="settings.topEndDate"
          aria-describedby="topRangeHelp"
        />
      </c-col>
      <c-col lg="12">
        <div id="topRangeHelp" class="form-text">
          Si se establece rango, se usará en los Top en lugar del periodo.
        </div>
      </c-col>
      @if (clearFeedback) {
        <c-col lg="12" aria-live="polite">
          <div class="alert alert-info py-1 px-2 mb-0">{{ clearFeedback }}</div>
        </c-col>
      }
    </c-row>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="onClose()">Cancelar</button>
    <button
      cButton
      color="warning"
      class="settings-clear-btn"
      (click)="onReset()"
      title="Restablecer campos a valores iniciales"
      [attr.aria-label]="'Limpiar campos'"
    >
      Limpiar
    </button>
    <button cButton color="primary" (click)="onApply()">Aplicar</button>
  </c-modal-footer>
</c-modal>
