<div class="register-container d-flex flex-row align-items-center min-vh-100 mt-5">
  <c-container>
    <c-row class="justify-content-center">
      <c-col md="6" lg="5">
        <c-card class="p-5 shadow-lg border-0 rounded-4">
          <c-card-body>
            <div class="text-center mb-4">
              <svg cIcon name="cilUserPlus" size="3xl" class="text-primary mb-3"></svg>
              <h2 class="fw-bold text-dark">Registro de Usuario</h2>
              <p class="text-muted">Crea una cuenta para interactuar con la comunidad.</p>
            </div>
            
            <form
              *ngIf="!isSuccessful"
              name="form"
              (ngSubmit)="f.form.valid && onSubmit()"
              #f="ngForm"
              novalidate
            >
              <div class="form-floating mb-3">
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  name="username"
                  placeholder="Usuario"
                  [(ngModel)]="form.username"
                  required
                  #username="ngModel"
                />
                <label for="username">Usuario</label>
                <div class="text-danger small mt-1" *ngIf="username.errors && f.submitted">
                  <div *ngIf="username.errors['required']">El usuario es requerido</div>
                </div>
              </div>

              <div class="form-floating mb-3">
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  name="email"
                  placeholder="Email"
                  [(ngModel)]="form.email"
                  required
                  email
                  #email="ngModel"
                />
                <label for="email">Correo Electrónico</label>
                <div class="text-danger small mt-1" *ngIf="email.errors && f.submitted">
                  <div *ngIf="email.errors['required']">El email es requerido</div>
                  <div *ngIf="email.errors['email']">El email no es válido</div>
                </div>
              </div>

              <div class="form-floating mb-4">
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  placeholder="Contraseña"
                  [(ngModel)]="form.password"
                  required
                  minlength="6"
                  #password="ngModel"
                />
                <label for="password">Contraseña</label>
                <div class="text-danger small mt-1" *ngIf="password.errors && f.submitted">
                  <div *ngIf="password.errors['required']">La contraseña es requerida</div>
                  <div *ngIf="password.errors['minlength']">Mínimo 6 caracteres</div>
                </div>
              </div>

              <div class="d-grid mb-3 mt-4">
                <button class="btn btn-primary btn-lg rounded-pill fw-bold" [disabled]="isLoading">
                  <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                  {{ isLoading ? 'Registrando...' : 'Registrarse' }}
                </button>
              </div>

              <div class="alert alert-danger mt-3 py-2 rounded-3" *ngIf="isSignUpFailed">
                <svg cIcon name="cilWarning" class="me-2"></svg> {{ errorMessage }}
              </div>
            </form>

            <div class="alert alert-success text-center py-4 rounded-3" *ngIf="isSuccessful">
              <svg cIcon name="cilCheckCircle" size="xl" class="mb-2"></svg><br>
              <strong>Registro exitoso.</strong><br> Redirigiendo al login...
            </div>
          </c-card-body>
        </c-card>
        
        <div class="text-center mt-4" *ngIf="!isSuccessful">
          <p class="text-muted">¿Ya tienes cuenta? <a routerLink="/login" class="text-decoration-none fw-bold text-primary">Inicia sesión aquí</a></p>
        </div>
      </c-col>
    </c-row>
  </c-container>
</div>
