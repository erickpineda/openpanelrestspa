<c-navbar colorScheme="light" expand="lg" class="bg-white shadow-sm sticky-top border-bottom py-3">
  <c-container>
    <a cNavbarBrand (click)="navigateToRoute('/home')" class="cursor-pointer fw-bold text-primary d-flex align-items-center gap-2 fs-4">
      <svg cIcon name="cilLayers" size="lg" class="text-primary"></svg>
      OpenPanel
    </a>
    <button class="navbar-toggler border-0" type="button" aria-label="Toggle navigation" (click)="visible = !visible">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div [class.collapse]="!visible" [class.navbar-collapse]="true" class="w-100">
      <c-navbar-nav class="mx-auto mb-2 mb-lg-0 gap-3 fw-medium">
        <c-nav-item>
          <a cNavLink id="home" (click)="navigateToRoute('/home')" class="cursor-pointer hover-primary transition-colors px-3 rounded-pill">{{ 'HEADER.HOME' | translate }}</a>
        </c-nav-item>
        <c-nav-item>
          <a cNavLink id="entradas" (click)="navigateToRoute('/entradas')" class="cursor-pointer hover-primary transition-colors px-3 rounded-pill">Blog</a>
        </c-nav-item>
        <c-nav-item>
          <a cNavLink id="about" (click)="navigateToRoute('/about')" class="cursor-pointer hover-primary transition-colors px-3 rounded-pill">{{ 'HEADER.ABOUT' | translate }}</a>
        </c-nav-item>
        <c-nav-item>
          <a cNavLink id="contact" (click)="navigateToRoute('/contact')" class="cursor-pointer hover-primary transition-colors px-3 rounded-pill">{{ 'HEADER.CONTACT' | translate }}</a>
        </c-nav-item>
      </c-navbar-nav>
      
      <c-navbar-nav class="ms-auto d-flex align-items-center gap-3">
        <c-nav-item>
          <a cNavLink (click)="toggleLanguage()" class="cursor-pointer d-flex align-items-center gap-1"
             [attr.aria-label]="currentLang === 'es' ? 'Cambiar a Inglés' : 'Switch to Spanish'">
            <span class="fi" [ngClass]="currentLang === 'es' ? 'fi-es' : 'fi-gb'"></span>
            {{ currentLang === 'es' ? 'EN' : 'ES' }}
          </a>
        </c-nav-item>

        @if (!isLoggedIn) {
          <c-nav-item>
            <button cButton color="outline-primary" variant="outline" size="sm" (click)="navigateToRoute('/login')">
              {{ 'HEADER.LOGIN' | translate }}
            </button>
          </c-nav-item>
          <c-nav-item>
            <button cButton color="primary" size="sm" (click)="navigateToRoute('/registro')">
              Registro
            </button>
          </c-nav-item>
        }
        @if (isLoggedIn) {
          <c-nav-item>
            <a cNavLink (click)="navigateToRoute('/admin')" class="cursor-pointer">{{ 'HEADER.ADMIN' | translate }}</a>
          </c-nav-item>
          <c-nav-item>
            <a cNavLink (click)="navigateToRoute('/perfil')" class="cursor-pointer">Perfil</a>
          </c-nav-item>
          <c-nav-item>
            <button cButton color="danger" variant="outline" size="sm" (click)="logout()" [disabled]="isLoadingLogout">
              @if (!isLoadingLogout) {
                <span>{{ 'HEADER.LOGOUT' | translate }}</span>
              }
              @if (isLoadingLogout) {
                <span>
                  <span class="spinner-border spinner-border-sm" role="status"></span>
                </span>
              }
            </button>
          </c-nav-item>
        }
      </c-navbar-nav>
    </div>
  </c-container>
</c-navbar>
