<c-card class="shadow-sm">
  <c-card-header class="bg-white py-3 border-bottom-0">
    <div
      class="d-flex justify-content-between align-items-center mb-3 gap-2 bg-light p-2 rounded border"
    >
      <div class="d-flex align-items-center gap-2">
        <svg cIcon name="cilChartPie" class="text-secondary"></svg>
        <h6 class="mb-0 fw-bold text-secondary text-uppercase small">
          {{ 'ADMIN.DASHBOARD.SPLIT.SERIES_BY_STATUS' | translate }}
        </h6>
      </div>
      <div class="d-flex flex-wrap gap-2" aria-label="Acciones">
        <button
          cButton
          color="secondary"
          variant="ghost"
          size="sm"
          (click)="downloadCsv.emit()"
          [title]="'ADMIN.DASHBOARD.SPLIT.DOWNLOAD_CSV' | translate"
          [attr.aria-label]="'ADMIN.DASHBOARD.SPLIT.DOWNLOAD_CSV' | translate"
          data-testid="btn-csv-split-estado"
          class="text-dark"
        >
          <svg cIcon name="cilCloudDownload" size="sm" class="me-1"></svg>
          {{ 'COMMON.CSV' | translate }}
        </button>
      </div>
    </div>
  </c-card-header>
  <c-card-body>
    @if (errorSplitEstado) {
      <div
        class="alert alert-danger d-flex align-items-center justify-content-between my-2"
        role="alert"
        aria-live="assertive"
      >
        <span>{{ errorSplitEstado }}</span>
        <button
          cButton
          color="danger"
          size="sm"
          class="retry-btn-split-estado"
          (click)="retry.emit()"
        >
          {{ 'COMMON.RETRY' | translate }}
        </button>
      </div>
    }
    @if (loadingSplitEstado) {
      <div class="mb-2" aria-live="polite" aria-busy="true"><c-spinner></c-spinner></div>
    }
    @if (seriesEntriesSplitData) {
      <div class="chart-container mb-2" [attr.aria-busy]="loadingSplitEstado ? 'true' : null">
        <app-dashboard-chart [data]="seriesEntriesSplitData" type="bar"></app-dashboard-chart>
      </div>
    }
    @if (!seriesEntriesSplitData) {
      <div class="text-muted small">{{ 'ADMIN.DASHBOARD.NO_DATA' | translate }}</div>
    }
  </c-card-body>
</c-card>
