<div class="bg-light bg-opacity-50 p-3 rounded-3 mb-4 border">
  <c-row class="align-items-center g-3">
    <c-col xs="12" md="4" class="d-flex align-items-center gap-3">
      <div class="text-nowrap fw-semibold text-secondary">
        {{ totalElements }} {{ 'COMMON.RECORDS' | translate }}
      </div>
      <select
        cSelect
        size="sm"
        [ngModel]="pageSize"
        (ngModelChange)="onPageSizeChange($event)"
        class="w-auto"
        [disabled]="cargando"
      >
        <option [ngValue]="5">5</option>
        <option [ngValue]="10">
          {{ 'ADMIN.COMMENTS.X_RECORDS' | translate: { count: 10 } }}
        </option>
        <option [ngValue]="20">
          {{ 'ADMIN.COMMENTS.X_RECORDS' | translate: { count: 20 } }}
        </option>
        <option [ngValue]="50">
          {{ 'ADMIN.COMMENTS.X_RECORDS' | translate: { count: 50 } }}
        </option>
      </select>
    </c-col>

    <c-col xs="12" md="8" class="d-flex gap-2 align-items-center">
      <op-search-basic
        [placeholder]="'ADMIN.COMMENTS.SEARCH_PLACEHOLDER' | translate"
        (onSearch)="onBasicSearchTextChange($event)"
        (onClear)="onBasicSearchTextChange('')"
      ></op-search-basic>
      <button
        cButton
        color="secondary"
        variant="outline"
        (click)="toggleAdvanced.emit()"
        [active]="showAdvanced"
        [disabled]="cargando"
      >
        <svg cIcon name="cilFilter" class="me-1"></svg>
        {{
          showAdvanced
            ? ('ADMIN.COMMENTS.FILTERS.HIDE_ADVANCED' | translate)
            : ('ADMIN.COMMENTS.FILTERS.SHOW_ADVANCED' | translate)
        }}
      </button>

      <c-dropdown variant="btn-group">
        <button
          cButton
          cDropdownToggle
          color="secondary"
          variant="ghost"
          size="sm"
          [cTooltip]="'Ordenar listado'"
        >
          <svg cIcon [name]="getSortIcon()" class="me-1"></svg>
        </button>
        <ul cDropdownMenu>
          <li>
            <button cDropdownItem (click)="ordenar('fechaCreacion', 'DESC')">
              <span *ngIf="isSortActive('fechaCreacion', 'DESC')" class="me-1 fw-bold">✓</span> Más
              recientes
            </button>
          </li>
          <li>
            <button cDropdownItem (click)="ordenar('fechaCreacion', 'ASC')">
              <span *ngIf="isSortActive('fechaCreacion', 'ASC')" class="me-1 fw-bold">✓</span> Más
              antiguos
            </button>
          </li>
          <li><hr cDropdownDivider /></li>
          <li>
            <button cDropdownItem (click)="ordenar('usuario.nombre', 'ASC')">
              <span *ngIf="isSortActive('usuario.nombre', 'ASC')" class="me-1 fw-bold">✓</span>
              Usuario (A-Z)
            </button>
          </li>
          <li>
            <button cDropdownItem (click)="ordenar('usuario.nombre', 'DESC')">
              <span *ngIf="isSortActive('usuario.nombre', 'DESC')" class="me-1 fw-bold">✓</span>
              Usuario (Z-A)
            </button>
          </li>
        </ul>
      </c-dropdown>
    </c-col>
  </c-row>

  @if (showAdvanced) {
    <div class="mt-3 pt-3 border-top">
      <c-row class="g-3">
        <c-col xs="12" md="4">
          <label class="form-label small fw-bold text-muted">
            {{ 'ADMIN.COMMENTS.FILTERS.USER_ID' | translate }}
          </label>
          <input
            cFormControl
            size="sm"
            type="text"
            [placeholder]="'ADMIN.COMMENTS.FILTERS.USER_ID_PLACEHOLDER' | translate"
            [value]="filtroUsuario"
            (input)="filtroUsuarioChange.emit($any($event.target).value)"
            [disabled]="cargando"
          />
        </c-col>
        <c-col xs="6" md="4">
          <label class="form-label small fw-bold text-muted">
            {{ 'ADMIN.COMMENTS.FILTERS.STATUS_APPROVED' | translate }}
          </label>
          <select
            cSelect
            size="sm"
            [value]="filtroAprobado === null ? '' : filtroAprobado ? 'true' : 'false'"
            (change)="
              filtroAprobadoChange.emit(
                $any($event.target).value === '' ? null : $any($event.target).value === 'true'
              )
            "
            [disabled]="cargando"
          >
            <option value="">
              {{ 'ADMIN.COMMENTS.FILTERS.ALL' | translate }}
            </option>
            <option value="true">
              {{ 'ADMIN.COMMENTS.FILTERS.APPROVED' | translate }}
            </option>
            <option value="false">
              {{ 'ADMIN.COMMENTS.FILTERS.NOT_APPROVED' | translate }}
            </option>
          </select>
        </c-col>
        <c-col xs="6" md="4">
          <label class="form-label small fw-bold text-muted">
            {{ 'ADMIN.COMMENTS.FILTERS.IN_QUARANTINE' | translate }}
          </label>
          <select
            cSelect
            size="sm"
            [value]="filtroCuarentena === null ? '' : filtroCuarentena ? 'true' : 'false'"
            (change)="
              filtroCuarentenaChange.emit(
                $any($event.target).value === '' ? null : $any($event.target).value === 'true'
              )
            "
            [disabled]="cargando"
          >
            <option value="">
              {{ 'ADMIN.COMMENTS.FILTERS.ALL' | translate }}
            </option>
            <option value="true">
              {{ 'ADMIN.COMMENTS.FILTERS.YES' | translate }}
            </option>
            <option value="false">
              {{ 'ADMIN.COMMENTS.FILTERS.NO' | translate }}
            </option>
          </select>
        </c-col>
        <c-col xs="12" class="d-flex justify-content-end gap-2 mt-2">
          <button
            cButton
            size="sm"
            color="secondary"
            variant="ghost"
            (click)="reset.emit()"
            [disabled]="cargando"
          >
            <svg cIcon name="cilX" size="sm" class="me-1"></svg>
            {{ 'COMMON.CLEAN' | translate }}
          </button>
          <button cButton size="sm" color="primary" (click)="search.emit()" [disabled]="cargando">
            <svg cIcon name="cilCheck" size="sm" class="me-1"></svg>
            {{ 'ADMIN.COMMENTS.FILTERS.APPLY_FILTERS' | translate }}
          </button>
        </c-col>
      </c-row>
    </div>
  }
</div>
