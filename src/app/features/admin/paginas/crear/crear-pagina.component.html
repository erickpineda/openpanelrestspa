<app-entrada-form
  [form]="entradaForm"
  [tiposEntr]="tiposEntr"
  [estadosEntr]="estadosEntr"
  [categorias]="categorias"
  [modoLectura]="false"
  [submitted]="submitted"
  (submitForm)="onGuardar($event)"
  (preview)="onPreviewEmit($event)"
  (cancelar)="onCancelar()"
  [customTitle]="'ADMIN.PAGES.NEW_PAGE' | translate"
  [customSubtitle]="'ADMIN.PAGES.SUBTITLE' | translate"
>
</app-entrada-form>

<!-- Modal Previa -->
<c-modal
  id="previewPaginaModal"
  [visible]="modalPreviaVisible"
  (visibleChange)="modalPreviaVisible = $event"
  size="xl"
  backdrop="static"
  scrollable
>
  <c-modal-header>
    <h5 cModalTitle>{{ 'ADMIN.PAGES.PREVIEW_TITLE' | translate }}</h5>
    <button (click)="onCerrarPreview()" cButtonClose></button>
  </c-modal-header>
  <c-modal-body>
    <app-previa-entrada
      [entrada]="entradaParaPrevia"
      [mostrarBotonesAccion]="false"
      (cerrar)="onCerrarPreview()"
      (editar)="onEditarDesdePreview()"
    >
    </app-previa-entrada>
  </c-modal-body>
  <c-modal-footer>
    <button cButton color="secondary" (click)="onCerrarPreview()">
      {{ 'AUTO.CERRAR' | translate }}
    </button>
    <button cButton color="primary" (click)="onEditarDesdePreview()">
      <svg cIcon name="cilPen" class="me-1"></svg>
      {{ 'COMMON.EDIT' | translate }}
    </button>
  </c-modal-footer>
</c-modal>
