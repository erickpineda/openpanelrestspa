<c-modal [visible]="visible" (visibleChange)="handleVisibleChange($event)" backdrop="static">
  <c-modal-header class="border-bottom-0">
    <h5 cModalTitle class="fw-bold text-danger">{{ 'COMMON.CONFIRM_DELETE' | translate }}</h5>
  </c-modal-header>
  <c-modal-body>
    <div class="text-center py-3">
      <svg cIcon name="cilTrash" size="4xl" class="text-danger mb-3 opacity-75"></svg>
      <p class="mb-1">{{ 'COMMON.VERIFY_DELETE' | translate }}</p>
      <h4 class="fw-bold text-dark">{{ etiqueta?.nombre }}</h4>
      <p class="text-muted small mt-2">
        <svg cIcon name="cilWarning" class="me-1"></svg> {{ 'COMMON.ACTION_CANNOT_BE_UNDONE' | translate }}
      </p>
    </div>
  </c-modal-body>
  <c-modal-footer class="border-top-0 justify-content-center pb-4">
    <button cButton color="secondary" variant="ghost" (click)="cerrarModal()">{{ 'COMMON.CANCEL' | translate }}</button>
    <button cButton color="danger" class="px-4" (click)="confirmar()" [disabled]="loading">
      @if (loading) {
      <c-spinner size="sm" class="me-2"></c-spinner>
      }
      {{ 'COMMON.DELETE' | translate }}
    </button>
  </c-modal-footer>
</c-modal>
