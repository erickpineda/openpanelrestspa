<!-- CoreUI Responsive Navigation Component -->
<div class="responsive-navigation-container" 
     *ngIf="responsiveState$ | async as state"
     [ngClass]="getNavigationClasses(state)">
  
  <!-- CoreUI Toggle Button for Mobile/Tablet -->
  <c-button *ngIf="shouldShowToggleButton(state)"
            variant="ghost"
            class="sidebar-toggle-btn"
            [class.mobile]="state.isMobile"
            [class.tablet]="state.isTablet"
            [attr.aria-label]="getToggleButtonText(state)"
            (click)="toggleSidebar()">
    <svg cIcon 
         [name]="state.sidebarCollapsed ? 'cilMenu' : 'cilX'" 
         size="lg"></svg>
    <span class="toggle-text" *ngIf="!state.isMobile">
      {{ getToggleButtonText(state) }}
    </span>
  </c-button>

  <!-- CoreUI Navigation Menu -->
  <c-sidebar-nav class="navigation-menu" 
                 [class.collapsed]="state.sidebarCollapsed"
                 [class.mobile-menu]="state.isMobile"
                 [class.tablet-menu]="state.isTablet"
                 [class.desktop-menu]="state.isDesktop"
                 [perfectScrollbar]="true">
    
    <!-- Mobile Overlay -->
    <div *ngIf="state.isMobile && !state.sidebarCollapsed" 
         class="mobile-overlay"
         (click)="collapseSidebar()"></div>

    <!-- CoreUI Navigation Items -->
    <ng-container *ngFor="let item of adaptedNavigationItems; trackBy: trackByNavItem">
      <ng-container *ngIf="shouldShowItem(item, state)">
        
        <!-- Section Title using CoreUI -->
        <c-nav-title *ngIf="item.title" 
                     class="nav-section-title"
                     [class.mobile-hidden]="state.isMobile">
          {{ item.name }}
        </c-nav-title>

        <!-- Navigation Item using CoreUI -->
        <c-nav-item *ngIf="!item.title">
          <c-nav-link [routerLink]="item.url"
                      routerLinkActive="active"
                      [routerLinkActiveOptions]="{ exact: false }"
                      class="nav-link"
                      [class.touch-target]="state.touchEnabled"
                      [attr.aria-label]="item.name"
                      [attr.data-testid]="toTestId(item.name || '')"
                      (click)="onNavigationItemClick(item)">
            
            <!-- CoreUI Icon -->
            <svg *ngIf="item.iconComponent?.name" 
                 cIcon 
                 [name]="item.iconComponent.name" 
                 class="nav-icon"></svg>
            <svg *ngIf="item.icon && !item.iconComponent" 
                 cIcon 
                 [name]="item.icon" 
                 class="nav-icon"></svg>

            <!-- Text -->
            <ng-container *ngIf="!state.sidebarCollapsed || state.isMobile">
              {{ item.name }}
            </ng-container>

            <!-- CoreUI Badge -->
            <c-badge *ngIf="item.badge" 
                     [color]="item.badge.color"
                     class="ms-auto nav-badge"
                     [ngClass]="['badge-' + (item.badge?.color || 'info'), {'zero-count': item.badge?.text === '0'}]">
              {{ item.badge.text }}
            </c-badge>

            <!-- Dynamic Badge using CoreUI -->
            <c-badge *ngIf="item.dynamicBadge" 
                     [color]="item.badge?.color || 'info'"
                     class="ms-auto dynamic-badge nav-badge"
                     [ngClass]="['badge-' + (item.badge?.color || 'info')]">
              <span class="badge-counter">0</span>
            </c-badge>
          </c-nav-link>

          <!-- CoreUI Submenu -->
          <c-nav-group *ngIf="item.children && item.children.length > 0 && !state.isMobile"
                       [compact]="state.sidebarCollapsed">
            <div class="nav-section-content">
              <ng-container *ngFor="let child of item.children; trackBy: trackByNavItem">
                <c-nav-item>
                  <c-nav-link [routerLink]="child.url"
                              routerLinkActive="active"
                              class="nav-sublink"
                              [class.touch-target]="state.touchEnabled"
                              [attr.aria-label]="child.name"
                              [attr.data-testid]="toTestId(child.name || '')"
                              (click)="onNavigationItemClick(child)">
                    
                    <svg *ngIf="child.icon" 
                         cIcon 
                         [name]="child.icon" 
                         class="nav-subicon"></svg>
                    
                    <ng-container *ngIf="!state.sidebarCollapsed">
                      {{ child.name }}
                    </ng-container>
 
                    <c-badge *ngIf="child.badge" 
                             [color]="child.badge.color"
                             class="ms-auto nav-subbadge"
                             [ngClass]="['badge-' + child.badge.color]">
                      {{ child.badge.text }}
                    </c-badge>
                  </c-nav-link>
                </c-nav-item>
              </ng-container>
            </div>
          </c-nav-group>
        </c-nav-item>
      </ng-container>
    </ng-container>

    <!-- Critical Functions Quick Access (Mobile Only) using CoreUI -->
    <c-nav-group *ngIf="state.isMobile && state.sidebarCollapsed" 
                 class="critical-functions-bar">
      <c-nav-title>Acceso Rápido</c-nav-title>
      <c-nav-item *ngFor="let func of criticalFunctions.slice(0, 4)">
        <c-nav-link [routerLink]="func.url"
                    class="critical-function-btn"
                    [attr.aria-label]="func.name"
                    (click)="onNavigationItemClick({ name: func.name, url: func.url, iconComponent: { name: func.icon } })">
          <svg cIcon [name]="func.icon"></svg>
          {{ func.name }}
        </c-nav-link>
      </c-nav-item>
    </c-nav-group>
  </c-sidebar-nav>
</div>
