<form cForm class="row g-3">
  <c-col lg="3">
    <label for="campoFiltro" cLabel>Campo</label>
    <select id="campoFiltro" cSelect [(ngModel)]="campoSeleccionado" (change)="actualizarOperacionesDisponibles()" name="campoFiltro">
      <option *ngFor="let campo of camposDisponibles" [value]="campo.valor">{{ campo.nombre }}</option>
    </select>
  </c-col>

  <c-col lg="3">
    <label for="operacionFiltro" cLabel>Operación</label>
    <select id="operacionFiltro" cSelect [(ngModel)]="operacionSeleccionada" name="operacionFiltro">
      <option *ngFor="let operacion of operacionesDisponibles" [value]="operacion.valor">{{ operacion.nombre }}</option>
    </select>
  </c-col>

  <c-col lg="3">
    <label for="valorBusqueda" cLabel>Buscar</label>
    <input
      id="valorBusqueda"
      cFormControl
      type="text"
      placeholder="Ingrese valor a buscar"
      [(ngModel)]="valorBusqueda"
      name="valorBusqueda"
    />
  </c-col>

  <c-col lg="3" class="d-flex align-items-end">
    <button type="button" (click)="buscar()" cButton>Buscar</button>
  </c-col>
</form>
