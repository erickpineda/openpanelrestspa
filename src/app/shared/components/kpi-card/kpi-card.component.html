<c-widget-stat-f
  [value]="value"
  [title]="label"
  padding="true"
  [color]="resolvedColor"
>
  <ng-template cTemplateId="widgetIconTemplate">
    <svg cIcon [name]="resolvedIcon" size="lg"></svg>
  </ng-template>
</c-widget-stat-f>
@if (subtitle) {
  <small class="text-muted d-block mt-1">{{ subtitle }}</small>
}
