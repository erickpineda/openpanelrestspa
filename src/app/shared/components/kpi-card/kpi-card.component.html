<div
  class="kpi-card h-100"
  [class.p-0]="variant === 'simple'"
  [class.cursor-pointer]="!!route"
  [routerLink]="route"
  [cTooltip]="tooltip"
  #kpiBody
>
  @if (variant === 'simple') {
    <c-widget-stat-b
      class="mb-0 h-100"
      [value]="displayValue.toString()"
      [title]="label"
      [color]="resolvedColor"
      [inverse]="false"
    >
    </c-widget-stat-b>
  } @else {
    <c-widget-stat-f [value]="displayValue" [title]="label" padding="true" [color]="resolvedColor">
      <ng-template cTemplateId="widgetIconTemplate">
        <svg cIcon [name]="resolvedIcon" size="lg"></svg>
      </ng-template>
    </c-widget-stat-f>
    @if (subtitle) {
      <small class="d-block mt-1">{{ subtitle }}</small>
    }
  }
</div>
