<c-card class="kpi-card">
  <c-card-body>
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h6 class="mb-1">{{ label }}</h6>
        <h3 class="mb-0">{{ value }}</h3>
        <small *ngIf="subtitle" class="text-muted">{{ subtitle }}</small>
      </div>
    </div>
  </c-card-body>
</c-card>
