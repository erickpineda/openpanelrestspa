<c-card class="text-center mx-auto my-5" style="max-width: 420px">
  <c-card-header class="bg-light">
    <div class="d-flex flex-column align-items-center">
      <span class="display-4 fw-bold text-primary">{{ 'AUTO.404' | translate }}</span>
    </div>
  </c-card-header>
  <c-card-body>
    <h2 class="mb-2">{{ 'AUTO.P_GINA_NO_ENCONTRADA' | translate }}</h2>
    <p class="text-muted mb-4">{{ 'AUTO.LO_SENTIMOS_LA_P_GINA_QUE_BUSC' | translate }}</p>
    <div class="d-flex justify-content-center gap-2">
      <button cButton color="primary" variant="outline" (click)="goBack()">
        <svg cIcon name="cilArrowLeft" class="me-2"></svg>
        Volver
      </button>
      <button cButton color="primary" (click)="goHome()">
        <svg cIcon name="cilHome" class="me-2"></svg>
        Ir al inicio
      </button>
      <button cButton color="secondary" (click)="contactSupport()">
        <svg cIcon name="cilContact" class="me-2"></svg>
        Contactar soporte
      </button>
    </div>
  </c-card-body>
</c-card>
