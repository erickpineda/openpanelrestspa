<c-modal
  [visible]="visible"
  (visibleChange)="onVisibleChange($event)"
  class="confirmation-modal"
  backdrop="static"
>
  <c-modal-header class="border-bottom-0">
    <h5 cModalTitle [class]="'fw-bold text-' + getHeaderColor()">{{ title }}</h5>
  </c-modal-header>

  <c-modal-body>
    <div class="text-center py-3">
      @if (type === 'danger') {
        <svg cIcon name="cilTrash" size="4xl" class="text-danger mb-3 opacity-75"></svg>
      } @else if (type === 'warning') {
        <svg cIcon name="cilWarning" size="4xl" class="text-warning mb-3 opacity-75"></svg>
      } @else {
        <svg cIcon name="cilInfo" size="4xl" class="text-primary mb-3 opacity-75"></svg>
      }

      <p class="mb-1" [class.fs-5]="!itemName">{{ message }}</p>

      @if (itemName) {
        <h4 class="fw-bold text-dark">{{ itemName }}</h4>
      }

      @if (warningText) {
        <p class="text-muted small mt-2">{{ warningText }}</p>
      }
    </div>
  </c-modal-body>

  <c-modal-footer class="border-top-0 justify-content-center pb-4">
    <button cButton color="secondary" variant="ghost" (click)="onCancel()">{{ cancelText }}</button>
    <button
      cButton
      [color]="getHeaderColor()"
      class="px-4"
      (click)="onConfirm()"
      [disabled]="loading"
    >
      @if (loading) {
        <c-spinner size="sm" class="me-2"></c-spinner>
      }
      {{ confirmText }}
    </button>
  </c-modal-footer>
</c-modal>
