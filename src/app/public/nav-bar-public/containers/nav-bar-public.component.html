<c-header>
    <c-container fluid>
      <c-header-brand routerLink="/home">Openpanel</c-header-brand>
      <c-header-nav class="ms-auto">
        <c-nav-item *ngIf="isLoggedIn">
          <a cNavLink routerLink="/admin">Admin</a>
        </c-nav-item>
        <c-nav-item>
          <a [active]="true" routerLink="/home" cNavLink>Inicio</a>
        </c-nav-item>
        <c-nav-item>
          <a cNavLink routerLink="/about">Acerca de</a>
        </c-nav-item>
        <c-nav-item>
          <a cNavLink routerLink="/contact">Contacto</a>
        </c-nav-item>
        <c-nav-item *ngIf="!isLoggedIn">
            <a cNavLink routerLink="/login">Login</a>
        </c-nav-item>
        <c-nav-item *ngIf="isLoggedIn">
          <a cNavLink routerLink="/login" (click)="logout()">LogOut</a>
      </c-nav-item>
      
      </c-header-nav>
    </c-container>
    
    
  </c-header>
