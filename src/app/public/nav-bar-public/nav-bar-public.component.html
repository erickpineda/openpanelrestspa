<c-header [ngClass]="{'navbar-fixed': true, 'navbar-shrink': isShrink}">
  <c-container fluid>
    <c-header-brand href="#home" class="brand-large">Openpanel</c-header-brand>
    <c-header-nav class="ms-auto">
      <c-nav-item *ngIf="isLoggedIn">
        <a cNavLink href="#admin">Admin</a>
      </c-nav-item>
      <c-nav-item>
        <a [active]="true" href="#home" cNavLink>Inicio</a>
      </c-nav-item>
      <c-nav-item>
        <a cNavLink href="#about">Acerca de</a>
      </c-nav-item>
      <c-nav-item>
        <a cNavLink href="#contact">Contacto</a>
      </c-nav-item>
      <c-nav-item *ngIf="!isLoggedIn">
        <a cNavLink href="#login">Login</a>
      </c-nav-item>
      <c-nav-item *ngIf="isLoggedIn">
        <a cNavLink href="#login" (click)="logout()">LogOut</a>
      </c-nav-item>
    </c-header-nav>
  </c-container>
</c-header>

<!-- Agrega este script al final del archivo -->
<script>
  document.querySelectorAll('a[cNavLink]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href').substring(1);
      document.getElementById(targetId).scrollIntoView({
        behavior: 'smooth'
      });
    });
  });
</script>
