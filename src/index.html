<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Openpanelspa</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta content="Proyecto Openpanel" name="description" />
    <meta content="openpanel" name="author" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.googletagmanager.com; script-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' http://localhost:8080 http://localhost:4200 https://www.googletagmanager.com; object-src 'none'; frame-src https://www.googletagmanager.com; form-action 'self'; base-uri 'self'" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search);
          var hash = window.location.hash || '';
          var e2eInHash = /[?&]e2e=1\b/.test(hash);
          if (params.get('e2e') === '1' || e2eInHash) {
            window.__E2E_BYPASS_AUTH__ = true;
          }
        } catch {}
      })();
    </script>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <app-root></app-root>
  </body>
</html>
