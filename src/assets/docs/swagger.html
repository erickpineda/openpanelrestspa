<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenPanel REST API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.onload = async function() {
        const preferBackend = '/api/v1/swagger.yaml';
        const fallbackAssets = '/assets/swagger.yaml';
        let url = preferBackend;
        try {
          const res = await fetch(preferBackend, { method: 'HEAD' });
          if (!res.ok) url = fallbackAssets;
        } catch {
          url = fallbackAssets;
        }
        window.SwaggerUIBundle({
          url,
          dom_id: '#swagger-ui',
          presets: [SwaggerUIBundle.presets.apis],
          layout: 'BaseLayout'
        });
      };
    </script>
  </body>
</html>
