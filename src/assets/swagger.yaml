      tags:
        - Dashboard
      parameters:
        - name: days
          in: query
          schema:
            type: integer
          required: false
        - name: granularity
          in: query
          schema:
            type: string
          required: false
        - name: force
          in: query
          required: false
          schema:
            type: boolean
            default: false
      x-codeSamples:
        - lang: curl
