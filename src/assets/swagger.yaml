openapi: 3.0.3
info:
  title: OpenPanel REST API
  version: 1.0.0
  description: API REST de OpenPanel, incluye todos los endpoints y modelos de datos principales.
servers:
  - url: /api/v1

tags:
  - name: Entradas
    description: Operaciones relacionadas con las entradas.
  - name: Usuarios
    description: Operaciones relacionadas con los usuarios.
  - name: Roles
    description: Operaciones relacionadas con los roles.
  - name: Privilegios
    description: Operaciones relacionadas con los privilegios.
  - name: Categorias
    description: Operaciones relacionadas con las categorías.
  - name: Comentarios
    description: Operaciones relacionadas con los comentarios.
  - name: Etiquetas
    description: Operaciones relacionadas con las etiquetas.
  - name: EstadoFlujos
    description: Operaciones relacionadas con los flujos de estado de entrada.
  - name: HerramientasAuxiliar
    description: Operaciones relacionadas con las herramientas auxiliares.
  - name: Dashboard
    description: Operaciones relacionadas con el dashboard y estadísticas.
